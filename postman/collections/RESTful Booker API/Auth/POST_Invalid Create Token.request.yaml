$kind: http-request
name: POST_Invalid Create Token
url: "{{base_url}}/auth"
method: POST
body:
  type: json
  content: "{\r

    \  \"username\": \"admin\",\r

    \  \"password\": \"salah123\"\r

    }"
scripts:
  - type: afterResponse
    code: "pm.environment.set(\"token\", pm.response.json().token);\r

      \r

      pm.test(\"Status code is 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      const data = pm.response.json();\r

      \r

      pm.test(\"Token should not exist\", function () {\r

      \    pm.expect(data.token).to.be.undefined;\r

      });\r

      \r

      pm.test(\"Reason is Bad credentials\", function () {\r

      \    pm.expect(data.reason).to.eql(\"Bad credentials\");\r

      });"
    language: text/javascript
order: 1348
