$kind: http-request
name: PATCH_Partial Update Booking without Credential
url: "{{base_url}}/booking/{{booking_id}}"
method: PATCH
headers:
  - key: Cookie
    value: token={{token}}
    disabled: true
  - key: Content-Type
    value: application/JSON
body:
  type: json
  content: "{\r

    \    \"lastname\": \"Hoodsy\"\r

    }"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 403\", function () {\r

      \    pm.response.to.have.status(403);\r

      });\r\n"
    language: text/javascript
order: 1000
