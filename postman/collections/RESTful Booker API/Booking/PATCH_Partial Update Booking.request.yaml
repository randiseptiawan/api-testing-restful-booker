$kind: http-request
name: PATCH_Partial Update Booking
url: "{{base_url}}/booking/{{booking_id}}"
method: PATCH
headers:
  Cookie: token={{token}}
  Content-Type: application/JSON
body:
  type: json
  content: "{\r

    \    \"lastname\": \"Hoodsy\"\r

    }"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      const data = pm.response.json();\r

      \r

      pm.test(\"Lastname is Hoodsy\", function () {\r

      \    pm.expect(data.lastname).to.eql(\"Hoodsy\");\r

      });"
    language: text/javascript
order: 2000
