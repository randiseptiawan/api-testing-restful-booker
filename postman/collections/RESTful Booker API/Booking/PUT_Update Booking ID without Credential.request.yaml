$kind: http-request
url: "{{base_url}}/booking/{{booking_id}}"
method: PUT
headers:
  - key: Cookie
    value: token={{token}}
    disabled: true
  - key: Content-Type
    value: application/JSON
body:
  type: json
  content: "{\r

    \  \"firstname\": \"Robins\",\r

    \  \"lastname\": \"Hoods\",\r

    \  \"totalprice\": 250,\r

    \  \"depositpaid\": true,\r

    \  \"bookingdates\": {\r

    \    \"checkin\": \"2026-06-25\",\r

    \    \"checkout\": \"2026-06-29\"\r

    \  },\r

    \  \"additionalneeds\": \"Breakfast\"\r

    }"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 403\", function () {\r

      \    pm.response.to.have.status(403);\r

      });"
    language: text/javascript
order: 8000
